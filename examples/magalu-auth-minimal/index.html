<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Magalu auth — exemplo mínimo</title>
  </head>
  <body>
    <main style="font-family: system-ui; max-width: 40rem; padding: 1.5rem">
      <h1>Magalu + Geraldo (exemplo)</h1>
      <p>
        Abre o popup do Magalu ID. O <code>code</code> chega via <code>postMessage</code> quando corresponder às
        origens permitidas. A troca do <code>code</code> por tokens deve ser feita no <strong>backend</strong> do
        teu app.
      </p>
      <p>
        <button id="login" type="button">Entrar com Magalu</button>
      </p>
      <pre id="log" style="background: #f4f4f4; padding: 1rem; white-space: pre-wrap"></pre>
    </main>
    <script type="module" src="/main.ts"></script>
  </body>
</html>
